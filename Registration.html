<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Enhanced Bank Registration Form</title>
<style>
  body {
    font-family: 'Segoe UI', sans-serif;
    background: #f2f4f8;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
  }
  .container {
    background: #fff;
    padding: 25px 35px;
    border-radius: 10px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    max-width: 550px;
    width: 100%;
  }
  h2 {
    text-align: center;
    margin-bottom: 20px;
    color: #222;
  }
  fieldset {
    border: 2px solid #0077ff; /* Highlight border for active area */
    border-radius: 8px;
    padding: 15px;
    margin-bottom: 10px;
    display: none;
  }
  fieldset.active {
    display: block;
  }
  legend {
    font-size: 1.1rem;
    font-weight: bold;
    color: #0077ff;
    padding: 3px 10px;
    border-radius: 5px;
    background-color: #e6f0ff;
    margin-bottom: 10px;
  }
  .form-group {
    margin-bottom: 15px;
  }
  label {
    display: block;
    margin-bottom: 5px;
    font-weight: 500;
  }
  input, select, textarea {
    width: 100%;
    padding: 10px;
    border: 1px solid #ccc;
    border-radius: 5px;
    font-size: 14px;
  }
  input[type="radio"], input[type="checkbox"] {
    width: auto;
    margin-right: 8px;
  }
  textarea {
    resize: vertical;
  }
  .radio-group {
    display: flex;
    gap: 12px;
  }
  .button-group {
    margin-top: 15px;
    display: flex;
    justify-content: space-between;
  }
  .btn {
    padding: 10px 18px;
    background: #0077ff;
    color: #fff;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    text-decoration: none;
    text-align: center;
  }
  .btn:hover {
    background: #005dc4;
  }
  input[name="step"] {
    display: none;
  }
  #step1:checked ~ form fieldset.step1,
  #step2:checked ~ form fieldset.step2,
  #step3:checked ~ form fieldset.step3 {
    display: block;
  }
</style>
</head>
<body>

<div class="container">
  <h2>Bank Registration</h2>

  <input type="radio" name="step" id="step1" checked>
  <input type="radio" name="step" id="step2">
  <input type="radio" name="step" id="step3">

  <form action="#" method="POST">

    <!-- Step 1: Personal Information -->
    <fieldset class="step1 active">
      <legend>Personal Details</legend>

      <div class="form-group">
        <label for="fullname">Full Name</label>
        <input type="text" id="fullname" name="fullname" required>
      </div>

      <div class="form-group">
        <label for="dob">Date of Birth</label>
        <input type="date" id="dob" name="dob" required>
      </div>

      <div class="form-group">
        <label>Gender</label>
        <div class="radio-group">
          <input type="radio" id="male" name="gender" value="male" required>
          <label for="male">Male</label>

          <input type="radio" id="female" name="gender" value="female" required>
          <label for="female">Female</label>

          <input type="radio" id="other" name="gender" value="other" required>
          <label for="other">Other</label>
        </div>
      </div>

      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" required>
      </div>

      <div class="form-group">
        <label for="phone">Phone Number</label>
        <input type="tel" id="phone" name="phone" pattern="[0-9]{10}" required placeholder="10-digit number">
      </div>

      <div class="button-group">
        <label for="step2" class="btn">Next →</label>
      </div>
    </fieldset>

    <!-- Step 2: Address & Preferences -->
    <fieldset class="step2">
      <legend>Address & Preferences</legend>

      <div class="form-group">
        <label for="address">Address</label>
        <textarea id="address" name="address" rows="3" required></textarea>
      </div>

      <div class="form-group">
        <label for="accountType">Account Type</label>
        <select id="accountType" name="accountType" required>
          <option value="">--Select--</option>
          <option value="savings">Savings</option>
          <option value="current">Current</option>
          <option value="fixed">Fixed Deposit</option>
        </select>
      </div>

      <div class="form-group">
        <label>Facilities Required</label>
        <input type="checkbox" id="debit" name="facilities" value="debit">
        <label for="debit" style="display:inline;">Debit Card</label><br>

        <input type="checkbox" id="internet" name="facilities" value="internet">
        <label for="internet" style="display:inline;">Internet Banking</label><br>

        <input type="checkbox" id="checkbook" name="facilities" value="checkbook">
        <label for="checkbook" style="display:inline;">Checkbook</label>
      </div>

      <div class="button-group">
        <label for="step1" class="btn">← Back</label>
        <label for="step3" class="btn">Next →</label>
      </div>
    </fieldset>

    <!-- Step 3: Security Setup -->
    <fieldset class="step3">
      <legend>Security Setup</legend>

      <div class="form-group">
        <label for="password">Create Password</label>
        <input type="password" id="password" name="password" minlength="6" required>
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirm Password</label>
        <input type="password" id="confirmPassword" name="confirmPassword" minlength="6" required>
      </div>

      <div class="form-group">
        <label for="securityQuestion">Security Question</label>
        <select id="securityQuestion" name="securityQuestion" required>
          <option value="">--Select Question--</option>
          <option value="pet">What is your pet’s name?</option>
          <option value="mother">What is your mother’s maiden name?</option>
          <option value="city">What is your birth city?</option>
        </select>
      </div>

      <div class="form-group">
        <label for="securityAnswer">Your Answer</label>
        <input type="text" id="securityAnswer" name="securityAnswer" required>
      </div>

      <div class="button-group">
        <label for="step2" class="btn">← Back</label>
        <button type="submit" class="btn">Submit</button>
      </div>
    </fieldset>

  </form>
</div>

</body>
</html>
